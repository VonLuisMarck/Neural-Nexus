version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  Neural-Nexus · Victim Lab
#  Simulates a corporate AI assistant application (RAG + RBAC) that an attacker
#  has already gained code-execution access to.
#
#  Usage:
#    docker compose up --build
#
#  Endpoints exposed to the host:
#    http://localhost:8080   – AI Security Lab web UI + API
#    http://localhost:11434  – Ollama (LLM inference)
#
#  The /skill/download endpoint serves neural_nexus_skill.py, which
#  connects back to the Neural-Nexus C2 server.
#  Set NN_C2 to point to YOUR C2 server before building:
#    NN_C2=http://192.168.1.100:5001
# ─────────────────────────────────────────────────────────────────────────────

services:
  ollama:
    image: ollama/ollama:latest
    container_name: victim-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=5m
    # Pull the model on first start
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull llama3 && wait"]

  lab-backend:
    build: ./backend
    container_name: victim-lab
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=llama3
      - LAB_ID=victim-corp-01
      - JWT_SECRET_KEY=change-this-in-production
      - PORT=8080
    volumes:
      - ./frontend:/app/../frontend:ro
      - ./skill:/skill:ro
    ports:
      - "8080:8080"
    depends_on:
      - ollama

volumes:
  ollama_data:
