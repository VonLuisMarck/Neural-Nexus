version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  Neural-Nexus · Victim Lab  (standalone mode)
#
#  Preferred: use the root docker-compose.yml which puts all services on
#  nn-demo-net with fixed IPs (172.30.0.x) so Falcon can detect them as
#  separate hosts.
#
#  This standalone compose is useful for developing / testing the victim-lab
#  in isolation without the full C2 stack.
#
#  Usage:
#    cd victim-lab && docker compose up --build
#
#  To run on the shared nn-demo-net (if the root compose already created it):
#    docker compose --env-file ../.env up --build
# ─────────────────────────────────────────────────────────────────────────────

services:
  ollama:
    image: ollama/ollama:latest
    container_name: victim-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama-entrypoint.sh:/ollama-entrypoint.sh:ro
    environment:
      - OLLAMA_KEEP_ALIVE=5m
      - OLLAMA_MODEL=llama3
    entrypoint: ["/bin/bash", "/ollama-entrypoint.sh"]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s
    networks:
      - victim-net

  lab-backend:
    build: ./backend
    container_name: victim-lab
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=llama3
      - LAB_ID=victim-corp-01
      - JWT_SECRET_KEY=change-this-in-production
      - PORT=8080
    volumes:
      - ./frontend:/frontend:ro
      - ./skill:/skill:ro
    ports:
      - "8080:8080"
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - victim-net

networks:
  victim-net:
    driver: bridge

volumes:
  ollama_data:
