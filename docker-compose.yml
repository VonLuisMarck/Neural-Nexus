version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  Neural-Nexus — Unified Demo Compose
#
#  Network topology (nn-demo-net  172.30.0.0/24):
#
#    172.30.0.2   nn-c2           Neural-Nexus C2 server (operator UI)
#    172.30.0.10  nn-victim-lab   CorpAI Assistant (RAG + JWT RBAC)
#    172.30.0.11  nn-victim-llm   Ollama LLM backend for the victim lab
#
#  Host ports:
#    5001  →  C2 operator UI        (http://localhost:5001)
#    8080  →  Victim AI assistant   (http://localhost:8080)
#    11434 →  Ollama API (optional)
#
#  Skill dropper — victim side:
#    python victim-lab/skill/neural_nexus_skill.py --c2 http://172.30.0.2:5000
#    (from within nn-demo-net) or
#    python victim-lab/skill/neural_nexus_skill.py --c2 http://localhost:5001
#    (from the host)
#
#  Usage:
#    docker compose up --build            # full stack
#    docker compose up c2                 # only C2
#    docker compose logs -f nn-c2         # follow C2 logs
# ─────────────────────────────────────────────────────────────────────────────

networks:
  nn-demo-net:
    name: nn-demo-net
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.30.0.0/24
          gateway: 172.30.0.1

services:

  # ── Neural-Nexus C2 ─────────────────────────────────────────────────────────
  c2:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: nn-c2:latest
    container_name: nn-c2
    hostname: nn-c2
    restart: unless-stopped
    networks:
      nn-demo-net:
        ipv4_address: 172.30.0.2
    ports:
      - "5001:5000"   # operator UI accessible at http://localhost:5001
    environment:
      - PORT=5000
      - DEBUG=false
    volumes:
      # Persist agent data and logs across restarts
      - c2_data:/app/data
      - ./server/config.json:/app/config.json:ro
    labels:
      nn.role: "c2"
      nn.ip: "172.30.0.2"

  # ── Victim LLM backend (Ollama) ─────────────────────────────────────────────
  victim-llm:
    image: ollama/ollama:latest
    container_name: nn-victim-llm
    hostname: nn-victim-llm
    restart: unless-stopped
    networks:
      nn-demo-net:
        ipv4_address: 172.30.0.11
    ports:
      - "11434:11434"   # expose for direct inspection / Falcon telemetry
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=10m
    labels:
      nn.role: "victim-llm"
      nn.ip: "172.30.0.11"

  # ── Victim AI assistant (CorpAI / RAG) ──────────────────────────────────────
  victim-lab:
    build:
      context: ./victim-lab/backend
      dockerfile: Dockerfile
    image: nn-victim-lab:latest
    container_name: nn-victim-lab
    hostname: nn-victim-lab
    restart: unless-stopped
    networks:
      nn-demo-net:
        ipv4_address: 172.30.0.10
    ports:
      - "8080:8080"   # victim web UI accessible at http://localhost:8080
    environment:
      - OLLAMA_HOST=http://172.30.0.11:11434
      - OLLAMA_MODEL=llama3
      - LAB_ID=victim-corp-01
      - JWT_SECRET_KEY=change-this-in-production
      - PORT=8080
      # C2 address for the skill dropper hint
      - NN_C2=http://172.30.0.2:5000
    volumes:
      - ./victim-lab/frontend:/frontend:ro
      - ./victim-lab/skill:/skill:ro
    depends_on:
      - victim-llm
    labels:
      nn.role: "victim-lab"
      nn.ip: "172.30.0.10"

volumes:
  ollama_data:
  c2_data:
