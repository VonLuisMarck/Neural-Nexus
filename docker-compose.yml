version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  Neural-Nexus — LLM Docker Compose
#
#  Solo el LLM (Ollama) corre en Docker.
#  El victim-lab (Flask + frontend) corre en LOCAL con venv.
#
#  Network topology:
#    172.30.0.11  nn-victim-llm   Ollama LLM backend
#
#  Host ports:
#    11434 →  Ollama API             (http://localhost:11434)
#    8080  →  victim-lab (local)     (http://localhost:8080)  ← venv local
#    5001  →  C2 server (local)      (http://localhost:5001)  ← manual
#
#  Arrancar victim-lab localmente:
#    ./start-victim-lab.sh
#
#  Usage:
#    docker compose up -d          # solo Ollama
#    docker compose logs -f
# ─────────────────────────────────────────────────────────────────────────────

networks:
  nn-demo-net:
    name: nn-demo-net
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.30.0.0/24
          gateway: 172.30.0.1

services:

  # ── Victim LLM backend (Ollama) ─────────────────────────────────────────────
  victim-llm:
    image: ollama/ollama:latest
    container_name: nn-victim-llm
    hostname: nn-victim-llm
    restart: unless-stopped
    networks:
      nn-demo-net:
        ipv4_address: 172.30.0.11
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./victim-lab/ollama-entrypoint.sh:/ollama-entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/ollama-entrypoint.sh"]
    environment:
      - OLLAMA_KEEP_ALIVE=10m
      - OLLAMA_MODEL=llama3
    # Allows containers to reach the host C2 as host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      nn.role: "victim-llm"
      nn.ip: "172.30.0.11"

volumes:
  ollama_data:
