version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  Neural-Nexus — Victim Stack Compose
#
#  The C2 server runs LOCALLY on the host (see start-demo.sh).
#  Only the victim-side services run here, isolated on nn-demo-net.
#
#  Network topology (nn-demo-net  172.30.0.0/24):
#
#    172.30.0.1   gateway / host  ← C2 reachable here from inside containers
#    172.30.0.10  nn-victim-lab   CorpAI Assistant (RAG + JWT RBAC)
#    172.30.0.11  nn-victim-llm   Ollama LLM backend
#
#  Host ports:
#    8080  →  Victim AI assistant   (http://localhost:8080)
#    11434 →  Ollama API (optional, for direct inspection)
#
#  Skill dropper from the host:
#    python victim-lab/skill/neural_nexus_skill.py --c2 http://localhost:5001
#
#  Usage (prefer start-demo.sh which also starts the local C2):
#    docker compose up --build
#    docker compose logs -f nn-victim-lab
# ─────────────────────────────────────────────────────────────────────────────

networks:
  nn-demo-net:
    name: nn-demo-net
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.30.0.0/24
          gateway: 172.30.0.1

services:

  # ── Victim LLM backend (Ollama) ─────────────────────────────────────────────
  victim-llm:
    image: ollama/ollama:latest
    container_name: nn-victim-llm
    hostname: nn-victim-llm
    restart: unless-stopped
    networks:
      nn-demo-net:
        ipv4_address: 172.30.0.11
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=10m
    # Allows containers to reach the host C2 as host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      nn.role: "victim-llm"
      nn.ip: "172.30.0.11"

  # ── Victim AI assistant (CorpAI / RAG) ──────────────────────────────────────
  victim-lab:
    build:
      context: ./victim-lab/backend
      dockerfile: Dockerfile
    image: nn-victim-lab:latest
    container_name: nn-victim-lab
    hostname: nn-victim-lab
    restart: unless-stopped
    networks:
      nn-demo-net:
        ipv4_address: 172.30.0.10
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_HOST=http://172.30.0.11:11434
      - OLLAMA_MODEL=llama3
      - LAB_ID=victim-corp-01
      - JWT_SECRET_KEY=change-this-in-production
      - PORT=8080
      # Skill dropper points to host C2 via gateway (172.30.0.1) or host.docker.internal
      - NN_C2=http://host.docker.internal:5001
    volumes:
      - ./victim-lab/frontend:/frontend:ro
      - ./victim-lab/skill:/skill:ro
    depends_on:
      - victim-llm
    # Allows victim-lab to reach the host C2 as host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      nn.role: "victim-lab"
      nn.ip: "172.30.0.10"

volumes:
  ollama_data:
